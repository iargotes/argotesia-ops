services:
  db:
    image: mysql:8.0
    container_name: argotesia_ops_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: argotesia_ops
      MYSQL_USER: ops_user
      MYSQL_PASSWORD: ops_pass
      MYSQL_ROOT_PASSWORD: ops_root
      TZ: America/Panama
    ports:
      - "3310:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    command: >-
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: argotesia_ops_phpmyadmin
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ops_root
    ports:
      - "8091:80"

volumes:
  db_data:

