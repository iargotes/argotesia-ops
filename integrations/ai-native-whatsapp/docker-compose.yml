services:
  app:
    build: .
    environment:
      APP_ENV: development
      APP_PORT: 8000
      DATABASE_URL: postgresql+psycopg://ai_ops_center:ai_ops_center@db:5432/ai_ops_center
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_ADMIN_CHAT_ID: "${TELEGRAM_ADMIN_CHAT_ID:-}"
      TELEGRAM_WEBHOOK_SECRET: "${TELEGRAM_WEBHOOK_SECRET:-}"
      TELEGRAM_USER_WORKER_MAP: "${TELEGRAM_USER_WORKER_MAP:-}"
      TELEGRAM_AGENT_TOKEN: "${TELEGRAM_AGENT_TOKEN:-}"
      WHATSAPP_ALLOWED_SENDERS: "${WHATSAPP_ALLOWED_SENDERS:-}"
      WHATSAPP_AUTO_REPLY: "${WHATSAPP_AUTO_REPLY:-false}"
      OPS_INTAKE_URL: "${OPS_INTAKE_URL:-}"
      OPS_TICKET_ACTIONS_URL: "${OPS_TICKET_ACTIONS_URL:-}"
      OPS_API_TOKEN: "${OPS_API_TOKEN:-}"
      OPS_PROJECT_KEY: "${OPS_PROJECT_KEY:-}"
      OPS_ASSIGNED_WORKER_KEY: "${OPS_ASSIGNED_WORKER_KEY:-}"
      OPS_CREATE_TICKET: "${OPS_CREATE_TICKET:-true}"
      OPS_TIMEOUT_SECONDS: "${OPS_TIMEOUT_SECONDS:-10}"
      WHISPER_ENABLED: "${WHISPER_ENABLED:-false}"
      WHISPER_MODEL: "${WHISPER_MODEL:-tiny}"
      WHISPER_LANGUAGE: "${WHISPER_LANGUAGE:-es}"
      WHISPER_COMPUTE_TYPE: "${WHISPER_COMPUTE_TYPE:-int8}"
      WHISPER_MAX_AUDIO_BYTES: "${WHISPER_MAX_AUDIO_BYTES:-10485760}"
      WHISPER_MAX_AUDIO_SECONDS: "${WHISPER_MAX_AUDIO_SECONDS:-300}"
      WHISPER_FFPROBE_BINARY: "${WHISPER_FFPROBE_BINARY:-ffprobe}"
      LLM_PROVIDER: mock
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/data

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_ops_center
      POSTGRES_USER: ai_ops_center
      POSTGRES_PASSWORD: ai_ops_center
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_ops_center -d ai_ops_center"]
      interval: 5s
      timeout: 3s
      retries: 10

  whatsapp:
    build:
      context: ./whatsapp-connector
    profiles:
      - whatsapp
    environment:
      PORT: 3000
      WHATSAPP_CONNECTOR_PORT: 3000
      WHATSAPP_BACKEND_WEBHOOK_URL: "${WHATSAPP_BACKEND_WEBHOOK_URL:-http://app:8000/webhooks/whatsapp}"
      WHATSAPP_CLIENT_ID: "${WHATSAPP_CLIENT_ID:-mcp-whatsapp-ai-ops-center}"
      WHATSAPP_ALLOWED_SENDERS: "${WHATSAPP_ALLOWED_SENDERS:-}"
      WHATSAPP_WEBHOOK_SECRET: "${WHATSAPP_WEBHOOK_SECRET:-}"
      WHATSAPP_AUTO_REPLY: "${WHATSAPP_AUTO_REPLY:-false}"
      WHATSAPP_MAX_AUDIO_BYTES: "${WHATSAPP_MAX_AUDIO_BYTES:-10485760}"
      WHATSAPP_AUDIO_TIMEOUT_MS: "${WHATSAPP_AUDIO_TIMEOUT_MS:-180000}"
    ports:
      - "3000:3000"
    depends_on:
      app:
        condition: service_started
    volumes:
      - whatsapp_auth:/usr/src/app/.wwebjs_auth
      - whatsapp_cache:/usr/src/app/.wwebjs_cache

volumes:
  postgres_data:
  whatsapp_auth:
  whatsapp_cache:
